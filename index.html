<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Vidurasa Agricultural Products</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            text-align: center;
            padding: 20px;
        }
        .coming-soon-card {
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            border: 1px solid var(--border);
        }
        .cs-logo {
            height: 100px;
            margin-bottom: 30px;
        }
        .cs-title {
            font-family: var(--f-serif);
            font-size: 32px;
            color: var(--secondary);
            margin-bottom: 20px;
        }
        .cs-divider {
            width: 60px;
            height: 3px;
            background: #E36414;
            margin: 0 auto 30px;
        }
        .cs-text {
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .contact-pill {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.3s;
        }
        .contact-pill:hover {
            background: #E36414;
        }
    </style>
</head>
<body>
    <div class="coming-soon-card">
        <img src="vidurasalogo.png" alt="Vidurasa Logo" class="cs-logo">
        <h1 class="cs-title">Something Beautiful is Brewing</h1>
        <div class="cs-divider"></div>
        <p class="cs-text">
            Our premium digital spice market is currently under construction. 
            We are preparing to bring you the finest Ceylon Cinnamon and agricultural heritage.
        </p>
        <p style="margin-bottom: 10px; font-weight: 700; color: var(--text-main); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">In the meantime</p>
        <a href="mailto:info@vidurasa.com" class="contact-pill">Connect with Us</a>
    </div>
</body>
</html>
